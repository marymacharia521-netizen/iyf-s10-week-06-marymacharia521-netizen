<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <section class="hero">
            <h1>Weather Dashboard</h1>
            <p class="subtitle">
                Search for a city and view live weather data.
            </p>
        </section>

        <section class="card weather-app">
            <form id="search-form" class="search-bar">
                <label class="sr-only" for="city-input">City name</label>
                <input
                    type="text"
                    id="city-input"
                    name="city"
                    placeholder="Enter city name..."
                    autocomplete="off"
                    required
                >
                <button type="submit">Search</button>
            </form>


            <div id="loading" class="status loading hidden" aria-live="polite">
                Loading weather data...
            </div>
            <div id="error" class="status error hidden" aria-live="polite"></div>

            <section id="weather-display" class="result hidden" aria-live="polite">
                <div class="weather-main">
                    <div>
                        <p class="label">Current Weather</p>
                        <h2 id="city-name"></h2>
                        <p id="description" class="description"></p>
                    </div>
                    <div class="temperature-block">
                        <img id="weather-icon" src="" alt="" class="weather-icon">
                        <p id="temperature" class="temperature"></p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="metric">
                        <span class="metric-label">Feels Like</span>
                        <strong id="feels-like"></strong>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Humidity</span>
                        <strong id="humidity"></strong>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Wind</span>
                        <strong id="wind"></strong>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Pressure</span>
                        <strong id="pressure"></strong>
                    </div>
                </div>
            </section>

            <section id="empty-state" class="result" aria-live="polite">
                <div class="empty-state">
                    Search for a city to see its current weather.
                </div>
            </section>

            <section id="recent-searches" class="history">
                <div class="history-header">
                    <h3>Recent Searches</h3>
                    <button type="button" id="clear-history" class="secondary-button">Clear</button>
                </div>
                <ul id="search-history" class="history-list"></ul>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
